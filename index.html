<style>
:root {
  --gold: #C9A84C;
  --gold2: #e8c96a;
  --dark: #18120a;
  --dark2: #231a0d;
  --surface: #2b2013;
  --surface2: #352814;
  --text: #f5ead8;
  --muted: #9a8a70;
  --border: rgba(201,168,76,0.18);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:var(--dark); color:var(--text); font-family:'Sora',sans-serif; overflow:hidden; }


#splash {
  position:fixed; inset:0; background:var(--dark); z-index:1000;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
  transition: opacity 0.55s ease, transform 0.55s ease;
}
#splash.hide { opacity:0; transform:scale(1.05); pointer-events:none; }
.splash-logo {
  width:140px; height:70px; border:1.5px solid rgba(201,168,76,0.3); border-radius:18px;
  display:flex; align-items:center; justify-content:center; background:rgba(201,168,76,0.07);
  animation: splashPulse 2s ease-in-out infinite;
}
.splash-logo svg, .splash-logo img { width:100%; height:100%; object-fit:contain; }
.splash-cafe { font-size:0.6rem; letter-spacing:0.55em; color:var(--gold); text-transform:uppercase; font-weight:300; }
.splash-name { font-family:'DM Serif Display',serif; font-size:2.8rem; color:var(--text); letter-spacing:0.1em; line-height:1; margin-top:-4px; }
.splash-dots { display:flex; gap:6px; margin-top:6px; }
.splash-dot { width:6px; height:6px; border-radius:50%; background:var(--gold); opacity:0.3; animation:dotBounce 1.4s ease-in-out infinite; }
.splash-dot:nth-child(2){animation-delay:0.2s;} .splash-dot:nth-child(3){animation-delay:0.4s;}
@keyframes splashPulse { 0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0);} 50%{box-shadow:0 0 0 14px rgba(201,168,76,0.07);} }
@keyframes dotBounce { 0%,80%,100%{opacity:0.3;transform:translateY(0);} 40%{opacity:1;transform:translateY(-4px);} }


#page-loader {
  position:fixed; inset:0; z-index:500;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity 0.2s;
  background:rgba(24,18,10,0.68); backdrop-filter:blur(3px);
}
#page-loader.show { opacity:1; pointer-events:all; }
.loader-card {
  background:var(--dark2); border:1px solid rgba(201,168,76,0.25); border-radius:28px;
  padding:30px 40px; display:flex; flex-direction:column; align-items:center; gap:13px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5); animation:loaderCardIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes loaderCardIn { from{transform:scale(0.88);opacity:0;} to{transform:scale(1);opacity:1;} }
.loader-logo-box {
  width:140px; height:65px; border:1px solid rgba(201,168,76,0.3); border-radius:16px;
  display:flex; align-items:center; justify-content:center; background:rgba(201,168,76,0.08);
  animation:loaderPulse 0.7s ease-in-out infinite alternate; padding:6px;
}
.loader-logo-box svg, .loader-logo-box img { width:100%; height:100%; object-fit:contain; }
.loader-card-name { font-family:'DM Serif Display',serif; font-size:1.4rem; color:var(--gold); letter-spacing:0.14em; }
.loader-dots { display:flex; gap:5px; }
.loader-dot { width:5px; height:5px; border-radius:50%; background:var(--gold); opacity:0.3; animation:dotBounce 1.2s ease-in-out infinite; }
.loader-dot:nth-child(2){animation-delay:0.15s;} .loader-dot:nth-child(3){animation-delay:0.3s;}
@keyframes loaderPulse { from{transform:scale(0.95);opacity:0.7;} to{transform:scale(1.02);opacity:1;} }


#app { height:100%; display:flex; flex-direction:column; overflow:hidden; position:relative; }
.page {
  position:absolute; inset:0; display:flex; flex-direction:column; overflow:hidden;
  opacity:0; pointer-events:none; transition:opacity 0.3s ease, transform 0.3s ease;
}
.page.active { opacity:1; pointer-events:all; transform:translateX(0) !important; }
.page.slide-in { transform:translateX(50px); }
.page.slide-out { transform:translateX(-30px); }


#page-home { background:var(--dark); overflow-y:auto; -webkit-overflow-scrolling:touch; }

.home-hero {
  position:relative; min-height:210px;
  display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
  padding:0 20px 28px; overflow:hidden; flex-shrink:0;
}
.home-mountains { position:absolute; inset:0; width:100%; height:100%; }
.home-hero-grad { position:absolute; inset:0; background:linear-gradient(to bottom,rgba(24,18,10,0.45) 0%,rgba(24,18,10,0.93) 100%); }
.home-hero-content { position:relative; z-index:2; text-align:center; }
.home-logo-box {
  width:130px; height:60px; background:rgba(201,168,76,0.1); border:1px solid rgba(201,168,76,0.28);
  border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 10px; padding:6px;
}
.home-logo-box svg, .home-logo-box img { width:100%; height:100%; object-fit:contain; }
.home-cafe-label { font-size:0.57rem; letter-spacing:0.55em; color:var(--gold); text-transform:uppercase; font-weight:300; }
.home-title { font-family:'DM Serif Display',serif; font-size:2.1rem; color:#fff; letter-spacing:0.08em; line-height:1; }
.home-sub { font-size:0.62rem; color:rgba(255,255,255,0.32); letter-spacing:0.2em; margin-top:5px; text-transform:uppercase; }

.lang-bar { position:absolute; top:14px; right:14px; z-index:10; display:flex; gap:6px; }
.lang-btn {
  background:rgba(255,255,255,0.08); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.14);
  color:rgba(255,255,255,0.55); padding:5px 12px; border-radius:20px;
  font-family:'Sora',sans-serif; font-size:0.64rem; font-weight:500; letter-spacing:0.08em; cursor:pointer; transition:all 0.2s;
}
.lang-btn.active { background:var(--gold); border-color:var(--gold); color:var(--dark); font-weight:700; }

.cat-section { padding:22px 20px 24px; flex-shrink:0; }
.cat-section-title { font-size:0.6rem; font-weight:600; letter-spacing:0.3em; text-transform:uppercase; color:var(--muted); margin-bottom:22px; text-align:center; }
.cat-grid { display:flex; flex-wrap:wrap; justify-content:center; gap:22px 14px; max-width:400px; margin:0 auto; }
.cat-circle { width:calc(33.33% - 10px); display:flex; flex-direction:column; align-items:center; gap:9px; cursor:pointer; }
.cat-circle-btn {
  width:78px; height:78px; border-radius:50%; border:1.5px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1); position:relative; overflow:hidden;
}
.cat-circle-btn::after {
  content:''; position:absolute; inset:0; border-radius:50%;
  background:radial-gradient(circle at 38% 32%,rgba(201,168,76,0.22) 0%,transparent 68%);
  opacity:0; transition:opacity 0.2s;
}
.cat-circle:active .cat-circle-btn, .cat-circle:hover .cat-circle-btn {
  transform:scale(1.09); border-color:var(--gold);
  box-shadow:0 0 0 5px rgba(201,168,76,0.1),0 8px 24px rgba(0,0,0,0.35);
}
.cat-circle:active .cat-circle-btn::after, .cat-circle:hover .cat-circle-btn::after { opacity:1; }
.cat-emoji { font-size:1.9rem; line-height:1; position:relative; z-index:1; }
.cat-circle-label { font-size:0.68rem; font-weight:500; color:var(--text); text-align:center; letter-spacing:0.01em; line-height:1.3; }


.home-footer { text-align:center; padding:0 20px 28px; }
.home-footer a { font-size:0.66rem; color:var(--muted); text-decoration:none; letter-spacing:0.1em; border-bottom:1px solid var(--border); padding-bottom:1px; }


#page-cat { background:var(--dark); }


.cat-bg-svg {
  position:absolute; pointer-events:none; z-index:0;
  opacity:0.065;
}

.cat-topbar {
  flex-shrink:0; background:var(--dark2); border-bottom:1px solid var(--border);
  padding:0 14px; height:58px; display:flex; align-items:center; gap:12px;
  position:relative; z-index:2;
}
.back-btn {
  width:36px; height:36px; border-radius:12px; background:var(--surface); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0; transition:all 0.2s; color:var(--gold); font-size:1rem; font-weight:600;
}
.back-btn:hover { background:var(--surface2); }
.cat-topbar-info { flex:1; display:flex; align-items:center; gap:8px; }
.cat-topbar-emoji { font-size:1.2rem; }
.cat-topbar-name { font-family:'DM Serif Display',serif; font-size:1.15rem; color:var(--text); }

.items-scroll {
  flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
  padding:6px 0 0; position:relative; z-index:1;
}

.sub-label {
  font-size:0.58rem; font-weight:600; letter-spacing:0.28em; text-transform:uppercase;
  color:var(--muted); padding:16px 16px 7px; display:flex; align-items:center; gap:10px;
}
.sub-label::after { content:''; flex:1; height:1px; background:var(--border); }

.item-row {
  display:flex; align-items:center; padding:11px 18px;
  border-radius:12px; margin:1px 10px; transition:background 0.15s; cursor:default;
}
.item-row:hover { background:var(--surface); }
.item-row + .item-row { border-top:1px solid rgba(201,168,76,0.06); }
.item-row-body { flex:1; min-width:0; }
.item-row-name { font-size:0.9rem; font-weight:500; color:var(--text); line-height:1.3; }
.item-row-vol { font-size:0.65rem; color:var(--muted); margin-top:1px; font-weight:300; }
.item-row-right { display:flex; flex-direction:column; align-items:flex-end; flex-shrink:0; margin-left:14px; }
.item-row-price { font-family:'DM Serif Display',serif; font-size:1.1rem; color:var(--gold); white-space:nowrap; line-height:1; }
.item-row-eur { font-family:'Sora',sans-serif; font-size:0.52rem; font-weight:300; color:var(--muted); letter-spacing:0.05em; margin-top:2px; }


.cat-footer {
  flex-shrink:0; position:relative; z-index:2;
  border-top:1px solid var(--border);
  padding:12px 18px;
  display:flex; align-items:center; justify-content:space-between;
  background:var(--dark2);
}
.cat-footer-loc {
  display:flex; align-items:center; gap:7px;
  font-size:0.7rem; color:var(--muted); letter-spacing:0.06em;
}
.cat-footer-pin { font-size:0.9rem; }
.cat-footer-text { line-height:1.35; }
.cat-footer-street { font-size:0.62rem; color:rgba(201,168,76,0.55); display:block; margin-top:1px; }
.cat-footer-map {
  font-size:0.65rem; color:var(--gold); text-decoration:none;
  border:1px solid rgba(201,168,76,0.25); padding:5px 12px; border-radius:20px;
  white-space:nowrap; transition:all 0.2s; flex-shrink:0; letter-spacing:0.06em;
}
.cat-footer-map:hover { background:var(--gold); color:var(--dark); }


.bottom-nav {
  flex-shrink:0; height:62px; background:var(--dark2); border-top:1px solid var(--border);
  display:flex; align-items:center; padding:0 14px;
  padding-bottom:env(safe-area-inset-bottom,0); position:relative; z-index:2;
}
.bottom-back-btn {
  flex:1; height:44px; background:var(--surface); border:1px solid var(--border); border-radius:14px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  cursor:pointer; font-family:'Sora',sans-serif; font-size:0.78rem; font-weight:500;
  color:var(--text); transition:all 0.2s; letter-spacing:0.03em;
}
.bottom-back-btn:hover { background:var(--surface2); border-color:rgba(201,168,76,0.3); }
.back-arrow { font-size:0.95rem; color:var(--gold); }


@media(min-width:640px) {
  html,body { background:#0e0c08; overflow:hidden; }
  #app { max-width:430px; margin:0 auto; box-shadow:0 0 80px rgba(0,0,0,0.7); }
  #splash,#page-loader { max-width:430px; left:50%; transform:translateX(-50%); }
  #page-loader.show { transform:translateX(-50%); }
}


@media(max-width:360px) {
  .cat-circle-btn { width:68px; height:68px; }
  .cat-emoji { font-size:1.65rem; }
  .cat-circle-label { font-size:0.62rem; }
}


#desktop { display:none; }

@media(min-width:1024px) {
  html,body { background:#0d0b07; overflow-y:auto; height:auto; }

  
  #splash { display:none !important; }
  #page-loader { display:none !important; }
  #app { display:none !important; }

 
  #desktop {
    display:flex;
    min-height:100vh;
  }

 
  #dt-shell {
    width:100%;
    max-width:100%;
    min-height:100vh;
    background:var(--dark);
    border-radius:0;
    overflow:hidden;
    box-shadow:none;
    display:flex;
    flex-direction:column;
    min-height:80vh;
  }

 
  .dt-hero {
    position:relative;
    padding:48px 40px 36px;
    overflow:hidden;
    flex-shrink:0;
    border-bottom:1px solid var(--border);
  }
  .dt-mountains { position:absolute; inset:0; width:100%; height:100%; }
  .dt-hero-grad { position:absolute; inset:0; background:linear-gradient(to bottom,rgba(24,18,10,0.4),rgba(24,18,10,0.9)); }
  .dt-hero-inner {
    position:relative; z-index:2;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
    text-align:center;
  }
  .dt-hero-logo {
    width:240px; height:100px;
    background:rgba(201,168,76,0.08);
    border:1px solid rgba(201,168,76,0.25);
    border-radius:20px;
    display:flex; align-items:center; justify-content:center;
    padding:10px;
  }
  .dt-hero-logo img { width:100%; height:100%; object-fit:contain; }
  .dt-hero-text { flex:1; }
  .dt-hero-cafe { font-size:0.62rem; letter-spacing:0.55em; color:var(--gold); text-transform:uppercase; font-weight:300; }
  .dt-hero-name { font-family:'DM Serif Display',serif; font-size:2.6rem; color:#fff; letter-spacing:0.08em; line-height:1; }
  .dt-hero-sub { font-size:0.65rem; color:rgba(255,255,255,0.3); letter-spacing:0.2em; margin-top:6px; text-transform:uppercase; }
  .dt-lang-bar { display:flex; gap:8px; margin-top:14px; justify-content:center; }
  .dt-lang-btn {
    background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12);
    color:rgba(255,255,255,0.5); padding:5px 16px; border-radius:20px;
    font-family:'Sora',sans-serif; font-size:0.65rem; font-weight:500;
    letter-spacing:0.07em; cursor:pointer; transition:all 0.2s;
  }
  .dt-lang-btn.active { background:var(--gold); border-color:var(--gold); color:var(--dark); font-weight:700; }

  
  .dt-cat-row {
    flex-shrink:0;
    padding:28px 32px 20px;
    border-bottom:1px solid var(--border);
    background:var(--dark2);
  }
  .dt-cat-row-title {
    font-size:0.58rem; font-weight:600; letter-spacing:0.3em; text-transform:uppercase;
    color:var(--muted); margin-bottom:18px;
  }
  .dt-cat-circles {
    display:flex; gap:20px; flex-wrap:wrap; justify-content:center;
  }
  .dt-cat-circle {
    display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer;
  }
  .dt-cat-circle-btn {
    width:72px; height:72px; border-radius:50%;
    border:1.5px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1);
    position:relative;
  }
  .dt-cat-circle-btn::after {
    content:''; position:absolute; inset:0; border-radius:50%;
    background:radial-gradient(circle at 38% 32%,rgba(201,168,76,0.22) 0%,transparent 68%);
    opacity:0; transition:opacity 0.2s;
  }
  .dt-cat-circle:hover .dt-cat-circle-btn,
  .dt-cat-circle.active .dt-cat-circle-btn {
    transform:scale(1.1); border-color:var(--gold);
    box-shadow:0 0 0 4px rgba(201,168,76,0.12), 0 6px 20px rgba(0,0,0,0.3);
  }
  .dt-cat-circle:hover .dt-cat-circle-btn::after,
  .dt-cat-circle.active .dt-cat-circle-btn::after { opacity:1; }
  .dt-cat-emoji { font-size:1.75rem; position:relative; z-index:1; }
  .dt-cat-label { font-size:0.66rem; font-weight:500; color:var(--text); text-align:center; }
  .dt-cat-circle.active .dt-cat-label { color:var(--gold); }

 
  #dt-content {
    flex:1; position:relative; display:flex; flex-direction:column;
  }
  #dt-bg-deco { position:absolute; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  #dt-bg-deco .cat-bg-svg { opacity:0.06; }

  #dt-welcome {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; text-align:center; padding:40px; z-index:1;
  }
  .dt-welcome-cafe-lbl { font-size:0.62rem; letter-spacing:0.55em; color:var(--gold); text-transform:uppercase; font-weight:300; margin-top:6px; }
  .dt-welcome-title { font-family:'DM Serif Display',serif; font-size:2.8rem; color:var(--text); letter-spacing:0.08em; line-height:1; }
  .dt-welcome-sub { font-size:0.72rem; color:var(--muted); letter-spacing:0.12em; }

  #dt-cat-header {
    display:none; align-items:center; gap:12px;
    padding:0 32px; height:62px;
    background:rgba(24,18,10,0.85);
    border-bottom:1px solid var(--border);
    position:relative; z-index:2; flex-shrink:0;
  }
  #dt-cat-header.show { display:flex; }
  .dt-cat-hdr-emoji { font-size:1.4rem; }
  .dt-cat-hdr-name { font-family:'DM Serif Display',serif; font-size:1.3rem; color:var(--text); }

  #dt-items {
    padding:6px 0 10px; position:relative; z-index:1;
    columns:2; column-gap:0; display:none;
  }
  #dt-items.show { display:block; }
  #dt-items .sub-label { column-span:all; padding:18px 28px 8px; font-size:0.6rem; }
  #dt-items .item-row { break-inside:avoid; margin:1px 16px; padding:11px 16px; }
  #dt-items .item-row-name { font-size:0.9rem; }
  #dt-items .item-row-price { font-size:1.1rem; }

  #dt-footer {
    flex-shrink:0;
    border-top:1px solid var(--border);
    padding:12px 32px;
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(24,18,10,0.8); position:relative; z-index:2;
  }
  .dt-footer-loc { display:flex; align-items:center; gap:8px; font-size:0.7rem; color:var(--muted); }
  .dt-footer-street { font-size:0.6rem; color:rgba(201,168,76,0.5); display:block; margin-top:2px; }
  .dt-footer-map {
    font-size:0.66rem; color:var(--gold); text-decoration:none;
    border:1px solid rgba(201,168,76,0.25); padding:6px 16px;
    border-radius:20px; transition:all 0.2s; letter-spacing:0.06em;
  }
  .dt-footer-map:hover { background:var(--gold); color:var(--dark); }

  #dt-copyright {
    flex-shrink:0;
    padding:12px 32px;
    display:flex; align-items:center; justify-content:space-between;
    background:var(--dark);
    border-top:1px solid rgba(201,168,76,0.1);
    font-size:0.6rem;
    color:var(--muted);
    letter-spacing:0.08em;
  }
}
</style>
</head>

let lang = 'me';
let activeCatKey = null;
function itemName(item){ return item[lang]||item.name||item.me||''; }

function buildItemsHtml(key){
  const cat = MENU[key];
  let html='';
  cat.subs.forEach(sub=>{
    const lbl = lang==='me'?sub.me:(sub.en||sub.me);
    if(lbl) html+=`<div class="sub-label">${lbl}</div>`;
    sub.items.forEach(item=>{
      const n=itemName(item),v=item.vol||'';
      html+=`<div class="item-row"><div class="item-row-body"><div class="item-row-name">${n}</div>${v?`<div class="item-row-vol">${v}</div>`:''}</div><div class="item-row-right"><div class="item-row-price">${item.price}</div><div class="item-row-eur">EUR</div></div></div>`;
    });
  });
  return html;
}


function buildHome(){
  const grid=document.getElementById('catGrid'); if(!grid) return;
  grid.innerHTML=Object.entries(MENU).map(([k,cat])=>`
    <div class="cat-circle" onclick="openCat('${k}')">
      <div class="cat-circle-btn" style="background:${cat.grad}"><span class="cat-emoji">${cat.emoji}</span></div>
      <div class="cat-circle-label">${lang==='me'?cat.me:cat.en}</div>
    </div>`).join('');
  const f=document.getElementById;
  
  const fml=document.getElementById('footer-map-link'); if(fml) fml.textContent=lang==='me'?'📍 Ulica Nikole Tesle, Nikšić — Otvori na mapi ↗':'📍 Nikole Tesle, Nikšić — Open on map ↗';
  const bl=document.getElementById('back-label'); if(bl) bl.textContent=lang==='me'?'Nazad na meni':'Back to menu';
  const cfl=document.getElementById('cat-footer-label'); if(cfl) cfl.textContent=lang==='me'?'Lokacija':'Location';
  const cfm=document.getElementById('cat-footer-map-btn'); if(cfm) cfm.textContent=lang==='me'?'Mapa ↗':'Map ↗';
}

function openCat(key){
  const cat=MENU[key], loader=document.getElementById('page-loader');
  loader.classList.add('show');
  setTimeout(()=>{
    document.getElementById('cat-bg-container').innerHTML=CAT_SVG[key]||'';
    document.getElementById('topbar-emoji').textContent=cat.emoji;
    document.getElementById('topbar-name').textContent=lang==='me'?cat.me:cat.en;
    document.getElementById('items-scroll').innerHTML=buildItemsHtml(key);
    document.getElementById('items-scroll').scrollTop=0;
    document.getElementById('page-home').classList.remove('active');
    document.getElementById('page-home').classList.add('slide-out');
    const pg=document.getElementById('page-cat');
    pg.classList.remove('slide-in'); pg.classList.add('active');
    loader.classList.remove('show');
  },480);
}

function goHome(){
  const loader=document.getElementById('page-loader');
  loader.classList.add('show');
  setTimeout(()=>{
    document.getElementById('page-cat').classList.remove('active');
    document.getElementById('page-cat').classList.add('slide-in');
    const h=document.getElementById('page-home');
    h.classList.remove('slide-out'); h.classList.add('active');
    loader.classList.remove('show');
  },340);
}

function setLang(l){ lang=l; syncLangBtns(l); buildHome(); }


function buildDtCats(){
  const el=document.getElementById('dt-cat-circles'); if(!el) return;
  el.innerHTML=Object.entries(MENU).map(([k,cat])=>`
    <div class="dt-cat-circle${activeCatKey===k?' active':''}" onclick="openDtCat('${k}')">
      <div class="dt-cat-circle-btn" style="background:${cat.grad}"><span class="dt-cat-emoji">${cat.emoji}</span></div>
      <div class="dt-cat-label">${lang==='me'?cat.me:cat.en}</div>
    </div>`).join('');
  
  
  const ws=document.getElementById('dt-welcome-sub'); if(ws) ws.textContent='Nikole Tesle · Nikšić';
  const fl=document.getElementById('dt-footer-lbl'); if(fl) fl.textContent=lang==='me'?'Lokacija':'Location';
  const fm=document.getElementById('dt-footer-map-btn'); if(fm) fm.textContent=lang==='me'?'Mapa ↗':'Map ↗';
  if(activeCatKey) openDtCat(activeCatKey);
}

function openDtCat(key){
  activeCatKey=key;
  const cat=MENU[key];
  document.querySelectorAll('.dt-cat-circle').forEach((el,i)=>{
    el.classList.toggle('active', Object.keys(MENU)[i]===key);
  });
  document.getElementById('dt-bg-deco').innerHTML=CAT_SVG[key]||'';
  document.getElementById('dt-hdr-emoji').textContent=cat.emoji;
  document.getElementById('dt-hdr-name').textContent=lang==='me'?cat.me:cat.en;
  document.getElementById('dt-cat-header').classList.add('show');
  const dw=document.getElementById('dt-welcome'); if(dw) dw.style.display='none';
  const items=document.getElementById('dt-items');
  items.innerHTML=buildItemsHtml(key);
  items.classList.add('show');
  items.scrollTop=0;
}

function setLangDt(l){ lang=l; syncLangBtns(l); buildDtCats(); buildHome(); }

function syncLangBtns(l){
  ['btn-me','btn-en','dt-btn-me','dt-btn-en'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.classList.toggle('active', id.includes(l==='me'?'me':'en'));
  });
}
